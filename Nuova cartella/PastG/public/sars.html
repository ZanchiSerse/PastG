<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dati Utente - PartiG</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #c4a484, #8b6f47);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .user-info {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #6f4e37;
        }

        p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .highlight {
            color: #8b6f47;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="user-info">
        <h1>Benvenuto su PastG</h1>
        <p><span class="highlight">Nome:</span> <span id="nome"></span></p>
        <p><span class="highlight">Email:</span> <span id="email"></span></p>
        <p><span class="highlight">Telefono:</span> <span id="telefono"></span></p>
    </div>

    <script>
        // Recupera i dati dell'utente dal localStorage
        const user = JSON.parse(localStorage.getItem('user'));

        if (user) {
            document.getElementById('nome').innerText = user.nome || 'N/A';
            document.getElementById('email').innerText = user.email || 'N/A';
            document.getElementById('telefono').innerText = user.telefono || 'N/A';
        } else {
            // Se non ci sono dati nel localStorage, mostra un messaggio di errore
            document.body.innerHTML = '<h1>Errore: Nessun dato utente trovato!</h1>';
        }
    </script>

</body>
</html>
